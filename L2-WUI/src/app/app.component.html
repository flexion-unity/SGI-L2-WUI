<div class="header fixed-top">
  <div class="flex-row">

    <div class="flex-grow-1 apptitle">
      <a href="#/home">
        <img class="logo" src="./assets/img/sgi_cube.png" alt="SGI Logo" />
      </a>
    </div>

    <div class="flex-grow-2" class="centertitle">
      SGI L2 Controller
    </div>

    <div class="flex-grow-1">
      <ul class="right-nav">
        <li>
          <mat-menu #actionsMenu="matMenu">
            <button mat-menu-item routerLink="/home">
              <mat-icon>home</mat-icon> Home
            </button>
            <button mat-menu-item (click)="btnPowerDialog()">
              <mat-icon>power_settings_new</mat-icon> Power
            </button>
            <button mat-menu-item routerLink="/visualrack">
              <mat-icon>dns</mat-icon> Visual Rack
            </button>
            <button mat-menu-item routerLink="/rackinfo">
              <mat-icon>info</mat-icon> Rack Info
            </button>
            <button mat-menu-item routerLink="/console">
              <mat-icon>terminal</mat-icon> L2 Console
            </button>
            <button mat-menu-item (click)="btnExecCommand('env/summary')">
              <mat-icon>thermostat</mat-icon> Environment
            </button>
            <button mat-menu-item (click)="btnExecCommand('fan')">
              <mat-icon>mode_fan</mat-icon> Fans
            </button>
            <button mat-menu-item (click)="btnAbout()">
              <mat-icon>info</mat-icon> About
            </button>
          </mat-menu>

          <button mat-button [matMenuTriggerFor]="actionsMenu">
            <mat-icon>menu</mat-icon> <span class="desktop-only"></span>
          </button>

        </li>
      </ul>
    </div>
  </div>
  <div class="clear"></div>
  <div class="headerLoader">
    <mat-progress-bar *ngIf="backendSVC.loading" mode="indeterminate"></mat-progress-bar>
  </div>
</div>


<div class="header-fixed-spacer"></div>

<div class="router-container">
  <router-outlet></router-outlet>
</div>
