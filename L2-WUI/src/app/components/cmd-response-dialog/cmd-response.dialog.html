<div>
    <h2 mat-dialog-title>Command: {{cmd}}</h2>
    <mat-dialog-content class="mat-typography">
        <div class="loader" *ngIf="inProgress">
            <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        </div>
        <div class="warning" *ngIf="errorMessage">{{errorMessage}}</div>


        <ul class="response">
            <li *ngFor="let entry of response">{{entry}}</li>
        </ul>

    </mat-dialog-content>
    <mat-dialog-actions align="end">
        <button mat-stroked-button mat-dialog-close cdkFocusInitial>Close</button>
    </mat-dialog-actions>
</div>
