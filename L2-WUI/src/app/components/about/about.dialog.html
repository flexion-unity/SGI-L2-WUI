<div>
    <h2 mat-dialog-title>About</h2>
    <mat-dialog-content class="mat-typography">
        <div class="loader" *ngIf="inProgress">
            <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        </div>

        <div *ngIf="!inProgress">
            SiliconGraphics L2 Controller Web UI<br><br>
            Web UI Version: {{uiversion}}<br/>
            API Server Version: {{serverversion}}<br/>
            <br/>
            &copy; flexion &amp; chulofiasco
        </div>

    </mat-dialog-content>
    <mat-dialog-actions align="end">
        <button mat-stroked-button mat-dialog-close cdkFocusInitial>Close</button>
    </mat-dialog-actions>
</div>
